ServerRoot "/usr/local/apache2"
ServerName localhost
Listen 80

LoadModule mpm_event_module modules/mod_mpm_event.so
LoadModule unixd_module modules/mod_unixd.so
LoadModule log_config_module modules/mod_log_config.so
LoadModule mime_module modules/mod_mime.so
LoadModule dir_module modules/mod_dir.so
LoadModule autoindex_module modules/mod_autoindex.so
LoadModule headers_module modules/mod_headers.so
LoadModule rewrite_module modules/mod_rewrite.so
LoadModule authn_core_module modules/mod_authn_core.so
LoadModule authn_file_module modules/mod_authn_file.so
LoadModule authz_core_module modules/mod_authz_core.so
LoadModule authz_user_module modules/mod_authz_user.so
LoadModule auth_basic_module modules/mod_auth_basic.so
LoadModule auth_digest_module modules/mod_auth_digest.so

User daemon
Group daemon

TypesConfig conf/mime.types

ErrorLog /proc/self/fd/2
LogLevel warn

DocumentRoot "/usr/local/apache2/htdocs"

<Directory "/usr/local/apache2/htdocs">
    Options Indexes FollowSymLinks
    AllowOverride None
    Require all granted
    Header set Accept-Ranges "bytes"
</Directory>

# Basic Auth
<Directory "/usr/local/apache2/htdocs/secured/basic">
    AuthType Basic
    AuthName "Secured Basic Test Area"
    AuthUserFile /usr/local/apache2/conf/.htpasswd
    Require valid-user
    Header set Accept-Ranges "bytes"
</Directory>

# Digest Auth
<Directory "/usr/local/apache2/htdocs/secured/digest">
    AuthType Digest
    AuthName "Secured Digest Test Area"
    AuthDigestDomain /secured/digest/
    AuthDigestProvider file
    AuthUserFile /usr/local/apache2/conf/.htdigest
    Require valid-user
    Header set Accept-Ranges "bytes"
</Directory>

# Bearer Token (validated via mod_rewrite string comparison)
<Directory "/usr/local/apache2/htdocs/secured/bearer">
    RewriteEngine On
    RewriteCond %{HTTP:Authorization} "!=Bearer eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJzdWIiOiJ0ZXN0LXVzZXIiLCJuYW1lIjoiVGVzdCBVc2VyIiwiaWF0IjoxNTE2MjM5MDIyfQ.tHN1PJiNw9UWRcmRGjXBc5rNWfr3Y9Py3C5dPNMOFzg"
    RewriteRule ^ - [R=401,L]
    Header set Accept-Ranges "bytes"
</Directory>

# API Key (validated via mod_rewrite string comparison)
<Directory "/usr/local/apache2/htdocs/secured/apikey">
    RewriteEngine On
    RewriteCond %{HTTP:X-API-Key} "!=api-key-test-value-12345"
    RewriteRule ^ - [R=401,L]
    Header set Accept-Ranges "bytes"
</Directory>

# Custom Header (validated via mod_rewrite string comparison)
<Directory "/usr/local/apache2/htdocs/secured/custom">
    RewriteEngine On
    RewriteCond %{HTTP:X-Custom-Auth} "!=custom-auth-test-value-67890"
    RewriteRule ^ - [R=401,L]
    Header set Accept-Ranges "bytes"
</Directory>
