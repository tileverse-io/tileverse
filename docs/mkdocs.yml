site_name: Tileverse Documentation
site_description: Java libraries for cloud-optimized geospatial data access
site_author: Multiversio LLC
copyright: "&copy; 2025 Multiversio LLC. All rights reserved."
repo_url: https://github.com/tileverse-io/tileverse
edit_uri: edit/main/docs/src/
site_url: https://tileverse.io/
docs_dir: src

theme:
  name: material
  logo: assets/images/tileverse-logo.svg
  favicon: assets/images/favicon.ico
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.indexes
    - navigation.top
    - toc.integrate
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: blue
      accent: blue
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: blue
      accent: blue
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  font:
    text: Inter
    code: JetBrains Mono
  icon:
    repo: fontawesome/brands/github
  
extra_css:
  - assets/stylesheets/extra.css

extra_javascript:
  - assets/javascripts/logo-link.js

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - toc:
      permalink: true
      title: On this page
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.betterem:
      smart_enable: all
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

plugins:
  - search:
      separator: '[\s\-,:!=\[\]()"`/]+|\.(?!\d)|&[lg]t;|(?!\b)(?=[A-Z][a-z])'
  - minify:
      minify_html: true

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Storage:
    - Overview: storage/index.md
    - How-to guides:
      - Install: storage/how-to/install.md
      - Use each backend: storage/how-to/use-each-backend.md
      - Configure for performance: storage/how-to/configure.md
      - Authenticate: storage/how-to/authenticate.md
      - Troubleshoot: storage/how-to/troubleshoot.md
      - Migrate from 1.4.x: storage/how-to/migrate-from-1.4.md
    - Reference:
      - Range Reader API: storage/reference/rangereader.md
      - Range Reader recipes: storage/reference/rangereader-recipes.md
      - Range Reader quick start: storage/reference/rangereader-quick-start.md
    - Explanation:
      - Why tileverse-storage?: storage/explanation/why.md
      - Internals - architecture: storage/explanation/internals.md
      - Internals - performance: storage/explanation/performance.md
  - PMTiles:
    - Overview: pmtiles/index.md
    - Tutorial: pmtiles/tutorial.md
    - How-to guides:
      - Read PMTiles: pmtiles/how-to/read-pmtiles.md
      - Use PMTiles in cloud storage: pmtiles/how-to/cloud-storage.md
    - Reference:
      - Tile Stores: pmtiles/reference/tile-stores.md
  - Vector Tiles:
    - Overview: vectortiles/index.md
    - Tutorial: vectortiles/tutorial.md
    - How-to guides:
      - Encode vector tiles: vectortiles/how-to/encode.md
      - Decode vector tiles: vectortiles/how-to/decode.md
  - Tile Matrix Set:
    - Overview: tilematrixset/index.md
    - Tutorial: tilematrixset/tutorial.md
    - How-to guides:
      - Tile pyramids and ranges: tilematrixset/how-to/tile-pyramids.md
      - Standard tile matrix sets: tilematrixset/how-to/standard-sets.md
    - Reference:
      - OGC compliance and encodings: tilematrixset/reference/ogc-compliance.md
  - Developer Guide:
    - Overview: developer-guide/index.md
    - How-to guides:
      - Build from source: developer-guide/how-to/build.md
      - Run tests: developer-guide/how-to/test.md
      - Contribute: developer-guide/how-to/contribute.md
    - Explanation:
      - System architecture: developer-guide/explanation/architecture.md
      - System design and data flow: developer-guide/explanation/system-design.md
      - Module dependencies: developer-guide/explanation/dependencies.md

extra:
  analytics:
    provider: google
    property: G-510Y1KN03V
  version:
    provider: mike
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/tileverse-io/tileverse
    - icon: fontawesome/solid/globe
      link: https://tileverse.io