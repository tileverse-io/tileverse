name: ♻ Backport
on:
  pull_request_target:
    types:
      - closed
      - labeled

permissions:
  contents: read

jobs:
  backport:
    permissions:
      contents: write
      pull-requests: write
      issues: write
    runs-on: ubuntu-24.04
    name: Backport
    if: github.event.pull_request.merged && contains( join( github.event.pull_request.labels.*.name, ' ' ), 'backport-' )
    steps:
      - name: Backport Bot
        uses: korthout/backport-action@v3
        with:
          github_token: ${{ secrets.GH_TOKEN_BOT }}
          label_pattern: "^backport-(?<target>.+)$"
